<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simon Says</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main class="game">
      <h1 class="js-heading">Simon Says</h1>

      <button class="js-start-button start-button">Start</button>

      <p class="js-status status hidden">Press start to begin.</p>

      <section class="pad-container js-pad-container unclickable">
        <button class="pad pad-red js-pad-red" data-color="red"></button>
        <button class="pad pad-green js-pad-green" data-color="green"></button>
        <button class="pad pad-blue js-pad-blue" data-color="blue"></button>
        <button class="pad pad-yellow js-pad-yellow" data-color="yellow"></button>
      </section>
    </main>

    <script src="./src/index.js"></script>
  </body>
</html>
